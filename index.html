<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>老方泰语100天计划</title>
  <style>
    :root {
      --bg: #f5f7f3;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #65717d;
      --line: #dbe2da;
      --primary: #176b55;
      --primary-dark: #0f4d3d;
      --accent: #f0b429;
      --soft: #edf5f1;
      --danger: #b23b3b;
      --shadow: 0 14px 36px rgba(20, 33, 26, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    button,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px 14px 48px;
    }

    .topbar {
      display: grid;
      gap: 14px;
      margin-bottom: 16px;
    }

    .hero {
      background: linear-gradient(135deg, #ffffff 0%, #edf5f1 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 6vw, 46px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .slogan {
      margin: 0;
      color: var(--primary);
      font-size: 16px;
      font-weight: 700;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: center;
    }

    .btn,
    .select {
      min-height: 44px;
      border-radius: 8px;
      padding: 10px 13px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: 0 5px 14px rgba(20, 33, 26, 0.05);
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn.primary:hover {
      background: var(--primary-dark);
    }

    .btn.ghost {
      background: var(--soft);
      color: var(--primary-dark);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(300px, 0.8fr);
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .lesson-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .day-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff7df;
      color: #6f4d00;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .meta {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 14px;
    }

    h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .phrase-list,
    .word-list,
    .review-list {
      display: grid;
      gap: 10px;
    }

    .phrase {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfa;
    }

    .thai {
      margin: 0 0 6px;
      font-size: 25px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: 0;
      font-family: "Leelawadee UI", "Noto Sans Thai", "Tahoma", sans-serif;
      white-space: pre-line;
    }

    .roman {
      margin: 0 0 6px;
      color: var(--primary-dark);
      font-weight: 700;
    }

    .chinese {
      margin: 0 0 4px;
      color: var(--text);
    }

    .english {
      margin: 0 0 4px;
      color: #425466;
      font-weight: 700;
    }

    .usage {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .sound {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 18px;
      align-self: start;
    }

    .word-list {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .word {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfa;
      min-height: 126px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px;
      gap: 8px;
      align-items: start;
    }

    .word .thai {
      font-size: 22px;
    }

    .word .sound {
      width: 38px;
      height: 38px;
      font-size: 15px;
    }

    .task-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #f2d184;
      background: #fff8e6;
    }

    .task-box p {
      margin: 0;
      font-weight: 700;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      border-radius: 8px;
      padding: 12px;
      background: var(--soft);
      border: 1px solid var(--line);
    }

    .stat strong {
      display: block;
      font-size: 26px;
      line-height: 1.1;
      color: var(--primary-dark);
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .done-msg {
      margin: 0 0 14px;
      padding: 12px;
      border-radius: 8px;
      background: #e8f5e9;
      color: #1b5e20;
      font-weight: 700;
      display: none;
    }

    .done-msg.show {
      display: block;
    }

    .review-item,
    .quiz-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfa;
    }

    .review-phrase {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px;
      gap: 8px;
      align-items: start;
      padding-top: 8px;
      margin-top: 8px;
      border-top: 1px solid var(--line);
    }

    .review-phrase .sound {
      width: 38px;
      height: 38px;
      font-size: 15px;
    }

    .review-origin {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .empty {
      color: var(--muted);
      margin: 0;
      padding: 12px;
      background: #fbfcfa;
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    .quiz-box {
      display: none;
      margin-top: 12px;
    }

    .quiz-box.show {
      display: block;
    }

    .quiz-answer {
      display: none;
      padding-top: 8px;
      margin-top: 8px;
      border-top: 1px solid var(--line);
    }

    .quiz-answer.show {
      display: block;
    }

    .side-section + .side-section {
      margin-top: 16px;
    }

    .sync-area {
      width: 100%;
      min-height: 112px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      color: var(--text);
      background: #fbfcfa;
      font: 13px/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .sync-note {
      margin: 8px 0 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .small-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      max-width: min(92vw, 520px);
      padding: 11px 14px;
      border-radius: 999px;
      background: #18221e;
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 860px) {
      .grid,
      .controls,
      .actions {
        grid-template-columns: 1fr;
      }

      .word-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: 10px 10px 34px;
      }

      .hero,
      .card {
        padding: 14px;
      }

      .lesson-head,
      .phrase {
        display: grid;
      }

      .day-tag {
        justify-self: start;
      }

      .word-list,
      .stats {
        grid-template-columns: 1fr;
      }

      .thai {
        font-size: 23px;
      }

      .sound {
        width: 100%;
        border-radius: 8px;
      }

      .word {
        grid-template-columns: minmax(0, 1fr) 44px;
      }

      .word .sound {
        width: 44px;
        height: 44px;
        border-radius: 50%;
      }

      .review-phrase {
        grid-template-columns: minmax(0, 1fr) 44px;
      }

      .review-phrase .sound {
        width: 44px;
        height: 44px;
        border-radius: 50%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="hero">
        <h1>老方泰语100天计划</h1>
        <p class="slogan">每天5句，100天后敢开口。</p>
      </div>

      <div class="controls" aria-label="天数切换">
        <button class="btn" id="prevDay">前一天</button>
        <select class="select" id="daySelect" aria-label="选择学习天数"></select>
        <button class="btn" id="nextDay">后一天</button>
        <button class="btn ghost" id="copyToday">复制今日内容</button>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <div class="lesson-head">
          <div>
            <p class="meta" id="categoryText"></p>
            <h2 id="themeText"></h2>
          </div>
          <span class="day-tag" id="dayText"></span>
        </div>

        <h3>今日泰语对话</h3>
        <div class="phrase-list" id="phraseList"></div>

        <div class="task-box">
          <h3>今日实战任务</h3>
          <p id="taskText"></p>
        </div>

        <div class="actions">
          <button class="btn primary" id="completeBtn">完成今日学习</button>
          <button class="btn" id="randomQuiz">随机抽查</button>
          <button class="btn" id="resetQuiz">清空抽查</button>
        </div>
      </article>

      <aside>
        <section class="card side-section">
          <div class="stats">
            <div class="stat">
              <strong id="streakText">0</strong>
              <span>连续学习天数</span>
            </div>
            <div class="stat">
              <strong id="totalText">0</strong>
              <span>总完成天数</span>
            </div>
          </div>
          <p class="done-msg" id="doneMsg"></p>

          <h3>今日5个单词</h3>
          <div class="word-list" id="wordList"></div>
        </section>

        <section class="card side-section">
          <h3>复习：昨天、3天前、7天前</h3>
          <div class="review-list" id="reviewList"></div>
        </section>

        <section class="card side-section">
          <h3>随机抽查</h3>
          <p class="empty" id="quizEmpty">点击“随机抽查”，从已完成打卡的内容里抽一句。</p>
          <div class="quiz-box" id="quizBox">
            <p class="thai" id="quizThai"></p>
            <div class="small-row">
              <button class="btn ghost" id="quizSpeak">播放</button>
              <button class="btn" id="showAnswer">显示中文</button>
            </div>
            <div class="quiz-answer" id="quizAnswer">
              <p class="roman" id="quizRoman"></p>
              <p class="chinese" id="quizChinese"></p>
              <p class="usage" id="quizUsage"></p>
            </div>
          </div>
        </section>

        <section class="card side-section">
          <h3>进度同步</h3>
          <p class="sync-note">电脑和手机各自保存进度。导出进度码后发到微信，再在另一台设备导入。</p>
          <textarea class="sync-area" id="syncCode" placeholder="这里会显示导出的进度码，也可以粘贴另一台设备的进度码"></textarea>
          <div class="small-row" style="margin-top: 10px;">
            <button class="btn ghost" id="exportProgress">导出进度</button>
            <button class="btn" id="importProgress">导入进度</button>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    // Day 1-20 是真实学习内容；Day 21-100 先用完整结构占位，方便后续逐天替换。
    const realLessons = [
      {
        day: 1,
        category: "基础生存口语",
        theme: "打招呼与自我介绍",
        phrases: [
          { thai: "สวัสดี", chinese: "你好", roman: "sa-wat-dee", usage: "见面打招呼，日常通用说法" },
          { thai: "ผมชื่อเหล่าฟาง", chinese: "我叫老方", roman: "phom cheu lao fang", usage: "第一次见面介绍自己" },
          { thai: "ยินดีที่ได้รู้จัก", chinese: "很高兴认识你", roman: "yin-dee thee dai roo-jak", usage: "认识新朋友或候选人时使用" },
          { thai: "คุณชื่ออะไร", chinese: "你叫什么名字？", roman: "khun cheu a-rai", usage: "日常询问对方姓名" },
          { thai: "ผมเป็นคนจีน", chinese: "我是中国人", roman: "phom pen khon jeen", usage: "说明自己的国家身份" }
        ],
        words: [
          { thai: "ผม", chinese: "我，男性用", roman: "phom" },
          { thai: "คุณ", chinese: "你，您", roman: "khun" },
          { thai: "ชื่อ", chinese: "名字，叫做", roman: "cheu" },
          { thai: "คนจีน", chinese: "中国人", roman: "khon jeen" },
          { thai: "สวัสดี", chinese: "你好", roman: "sa-wat-dee" }
        ],
        task: "今天至少对一个泰国人说一次：สวัสดี"
      },
      {
        day: 2,
        category: "基础生存口语",
        theme: "感谢与道歉",
        phrases: [
          { thai: "ขอบคุณ", chinese: "谢谢", roman: "khop khun", usage: "收到帮助、服务或回答时使用" },
          { thai: "ขอบคุณมาก", chinese: "非常感谢", roman: "khop khun maak", usage: "表达更强烈的感谢" },
          { thai: "ไม่เป็นไร", chinese: "没关系", roman: "mai pen rai", usage: "回应道歉或小问题" },
          { thai: "ขอโทษ", chinese: "对不起，不好意思", roman: "kho thot", usage: "打扰别人或犯错时使用" },
          { thai: "รบกวนหน่อย", chinese: "麻烦你一下", roman: "rop kuan noi", usage: "请求别人帮忙前的常用表达" }
        ],
        words: [
          { thai: "ขอบคุณ", chinese: "谢谢", roman: "khop khun" },
          { thai: "มาก", chinese: "很，非常", roman: "maak" },
          { thai: "ขอโทษ", chinese: "对不起", roman: "kho thot" },
          { thai: "รบกวน", chinese: "打扰，麻烦", roman: "rop kuan" },
          { thai: "หน่อย", chinese: "一点，一下", roman: "noi" }
        ],
        task: "今天买东西或进店时，用泰语说一次：ขอบคุณ"
      },
      {
        day: 3,
        category: "基础生存口语",
        theme: "是、不是、听不懂",
        phrases: [
          { thai: "ใช่", chinese: "是的", roman: "chai", usage: "确认对方说法时使用" },
          { thai: "ไม่ใช่", chinese: "不是", roman: "mai chai", usage: "否认或纠正信息" },
          { thai: "ผมไม่เข้าใจ", chinese: "我不明白", roman: "phom mai khao jai", usage: "听不懂对方意思时使用" },
          { thai: "พูดช้า ๆ ได้ไหม", chinese: "可以说慢一点吗？", roman: "phoot chaa chaa dai mai", usage: "让对方放慢语速" },
          { thai: "ช่วยพูดอีกครั้ง", chinese: "请再说一遍", roman: "chuay phoot eek khrang", usage: "需要对方重复时使用" }
        ],
        words: [
          { thai: "ใช่", chinese: "是", roman: "chai" },
          { thai: "ไม่", chinese: "不，没", roman: "mai" },
          { thai: "เข้าใจ", chinese: "明白，理解", roman: "khao jai" },
          { thai: "พูด", chinese: "说", roman: "phoot" },
          { thai: "ช้า", chinese: "慢", roman: "chaa" }
        ],
        task: "今天遇到听不懂时，不要切回中文，先说：พูดช้า ๆ ได้ไหม"
      },
      {
        day: 4,
        category: "基础生存口语",
        theme: "数字与价格",
        phrases: [
          { thai: "ราคาเท่าไหร่", chinese: "多少钱？", roman: "raa-khaa thao-rai", usage: "询问商品或服务价格" },
          { thai: "แพงไป", chinese: "太贵了", roman: "phaeng pai", usage: "觉得价格高时使用" },

          { thai: "เอาอันนี้", chinese: "我要这个", roman: "ao an nee", usage: "确认购买某个东西" },

        ],
        words: [
          { thai: "ราคา", chinese: "价格", roman: "raa-khaa" },
          { thai: "เท่าไหร่", chinese: "多少", roman: "thao-rai" },
          { thai: "แพง", chinese: "贵", roman: "phaeng" },
          { thai: "ลด", chinese: "减少，降价", roman: "lot" },

        task: "今天在便利店或摊位问一次：ราคาเท่าไหร่"

      {
        day: 5,
        category: "基础生存口语",
        theme: "点餐喝水",

        ],
        words: [

          { thai: "น้ำเปล่า", chinese: "矿泉水，白水", roman: "nam plao" },
          { thai: "เผ็ด", chinese: "辣", roman: "phet" },
          { thai: "อร่อย", chinese: "好吃", roman: "a-roi" },
          { thai: "คิดเงิน", chinese: "结账", roman: "khit ngoen" }
        ],
        task: "今天点餐时至少用一句泰语，比如：ไม่เผ็ด"
      },
      {
        day: 6,
        category: "基础生存口语",
        theme: "打车与方向",
        phrases: [
          { thai: "ไปที่นี่", chinese: "去这里", roman: "pai thee nee", usage: "给司机看地址时使用" },
          { thai: "เลี้ยวซ้าย", chinese: "左转", roman: "liao saai", usage: "指路时说左转" },

    function packForDay(category, day) {
      const packs = generatedLessonPacks[category];
      return packs[(day - 1) % packs.length];
    }

    function makeGeneratedLesson(day) {
      const category = categoryForDay(day);
      const pack = packForDay(category, day);
      return {
        day,
        category,
        theme: pack.theme,
        phrases: pack.phrases.map(([thai, speak, chinese, english, roman, usage]) => ({
          thai, speak, chinese, english, roman, usage
        })),
        words: pack.words.map(([thai, chinese, roman]) => ({ thai, chinese, roman })),
        task: `今天录一条 30 秒 TikTok 练习视频：先读 Day ${day} 的 3 组对话，再选 1 组用自己的语气复述。`
      };
    }

    function compactLessonAfterDay10(lesson) {
      if (lesson.day <= 10) return lesson;
      return {
        ...lesson,
        phrases: lesson.phrases.slice(0, 3),
        task: lesson.task.replace("5 组对话", "3 组对话")
      };
    }

      ...realDialogueLessons,

      "运费多少钱？": "How much is the shipping fee?",
      "这个东西易碎": "This item is fragile.",
      "这个周末你去哪儿？": "Where are you going this weekend?",
      "我想去逛商场": "I want to go walk around the mall.",
      "一起去吗？": "Do you want to go together?",
      "我得工作": "I have to work.",
      "好好休息": "Have a good rest."
    };

    let currentDay = Number(localStorage.getItem("laofangThai100CurrentDay")) || 1;
    let currentQuizPhrase = null;

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { completedDays: [], completionDates: {} };
      try {
        const parsed = JSON.parse(raw);
        return {
          completedDays: Array.isArray(parsed.completedDays) ? parsed.completedDays : [],
          completionDates: parsed.completionDates || {}
        };
      } catch (error) {
        return { completedDays: [], completionDates: {} };
      }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function normalizeState(state) {
      const completedDays = [...new Set((state.completedDays || [])
        .map(Number)
        .filter((day) => Number.isInteger(day) && day >= 1 && day <= 100))]
        .sort((a, b) => a - b);
      const completionDates = {};
      Object.keys(state.completionDates || {}).forEach((key) => {
        if (/^\d{4}-\d{2}-\d{2}$/.test(key)) completionDates[key] = true;
      });
      return { completedDays, completionDates };
    }

    function todayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function dateKeyFromOffset(offset) {
      const date = new Date();
      date.setDate(date.getDate() - offset);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function calculateStreak(completionDates) {
      let streak = 0;
      while (completionDates[dateKeyFromOffset(streak)]) {
        streak += 1;
      }
      return streak;
    }

    function getLesson(day) {
      return lessons.find((lesson) => lesson.day === day) || lessons[0];
    }

    function getEnglishMeaning(phrase) {
      if (phrase.english) return phrase.english;
      if (englishMeanings[phrase.chinese]) return englishMeanings[phrase.chinese];
      return `Literal English: ${phrase.chinese}`;
    }

    function getSpeakText(phrase) {
      return phrase.speak || phrase.thai.replaceAll("A:", "").replaceAll("B:", "").trim();
    }

    function loadVoices() {
      return new Promise((resolve) => {
        if (!("speechSynthesis" in window)) {
          resolve([]);
          return;
        }

        const voices = window.speechSynthesis.getVoices();
        if (voices.length) {
          resolve(voices);
          return;
        }

        const timer = window.setTimeout(() => resolve(window.speechSynthesis.getVoices()), 1200);
        window.speechSynthesis.onvoiceschanged = () => {
          window.clearTimeout(timer);
          resolve(window.speechSynthesis.getVoices());
        };
      });
    }

    async function speakThai(text) {
      if (!("speechSynthesis" in window) || typeof SpeechSynthesisUtterance === "undefined") {
        alert("你的浏览器不支持 Web Speech API 发音功能，请换 Chrome 或 Edge 试试。");
        return;
      }

      window.speechSynthesis.cancel();
      const voices = await loadVoices();
      const thaiVoice = voices.find((voice) => voice.lang && voice.lang.toLowerCase().startsWith("th"))
        || voices.find((voice) => voice.name && voice.name.toLowerCase().includes("thai"));

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "th-TH";
      if (thaiVoice) utterance.voice = thaiVoice;
      utterance.rate = 0.82;
      utterance.onstart = () => showToast("正在播放泰语发音");
      utterance.onend = () => showToast("播放完成");
      utterance.onerror = () => {
        showToast("播放失败：请检查浏览器声音和系统语音包");
      };

      if (!thaiVoice && voices.length) {
        showToast("未找到泰语语音包，先用浏览器默认语音尝试播放");
      }

      window.speechSynthesis.speak(utterance);

      window.setTimeout(() => {
        if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
          showToast("没有听到声音？请检查电脑音量或安装泰语语音包");
        }
      }, 700);
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function renderDaySelect() {
      const select = document.getElementById("daySelect");
      select.innerHTML = lessons.map((lesson) => `<option value="${lesson.day}">Day ${lesson.day}</option>`).join("");
      select.value = String(currentDay);
    }

    function renderLesson() {
      const lesson = getLesson(currentDay);
      const state = loadState();
      const completed = state.completedDays.includes(currentDay);

      localStorage.setItem("laofangThai100CurrentDay", String(currentDay));
      document.getElementById("daySelect").value = String(currentDay);
      document.getElementById("prevDay").disabled = currentDay === 1;
      document.getElementById("nextDay").disabled = currentDay === 100;
      document.getElementById("dayText").textContent = `当前学习天数：Day ${lesson.day}`;
      document.getElementById("categoryText").textContent = lesson.category;
      document.getElementById("themeText").textContent = `今日主题：${lesson.theme}`;
      document.getElementById("taskText").textContent = lesson.task;

      document.getElementById("phraseList").innerHTML = lesson.phrases.map((phrase, index) => `
        <div class="phrase">
          <div>
            <p class="thai">${phrase.thai}</p>
            <p class="roman">${phrase.roman}</p>
            <p class="chinese">${index + 1}. ${phrase.chinese}</p>
            <p class="english">${getEnglishMeaning(phrase)}</p>
            <p class="usage">使用场景：${phrase.usage}</p>
          </div>
          <button class="sound" data-speak="${escapeHtml(getSpeakText(phrase))}" aria-label="播放泰语发音">▶</button>
        </div>
      `).join("");

      document.getElementById("wordList").innerHTML = lesson.words.map((word) => `
        <div class="word">
          <div>
            <p class="thai">${word.thai}</p>
            <p class="roman">${word.roman}</p>
            <p class="chinese">${word.chinese}</p>
          </div>
          <button class="sound" data-speak="${escapeHtml(word.thai)}" aria-label="播放单词发音">▶</button>
        </div>
      `).join("");

      document.getElementById("completeBtn").textContent = completed ? "今日已完成" : "完成今日学习";
      document.getElementById("doneMsg").classList.toggle("show", completed);
      document.getElementById("doneMsg").textContent = completed ? encouragements[(currentDay - 1) % encouragements.length] : "";

      renderStats();
      renderReview();
    }

    function renderStats() {
      const state = loadState();
      document.getElementById("streakText").textContent = calculateStreak(state.completionDates);
      document.getElementById("totalText").textContent = state.completedDays.length;
    }

    function renderReview() {
      const offsets = [
        { label: "昨天", value: 1 },
        { label: "3天前", value: 3 },
        { label: "7天前", value: 7 }
      ];
      const reviewItems = offsets
        .map((offset) => {
          const reviewDay = currentDay - offset.value;
          if (reviewDay < 1) return "";
          const lesson = getLesson(reviewDay);
          return `
            <div class="review-item">
              <p class="review-origin">${offset.label} · Day ${reviewDay} · ${lesson.theme}</p>
              ${lesson.phrases.map((phrase) => `
                <div class="review-phrase">
                  <div>
                    <p class="thai">${phrase.thai}</p>
                    <p class="chinese">${phrase.chinese}</p>
                  </div>
                  <button class="sound" data-speak="${escapeHtml(getSpeakText(phrase))}" aria-label="播放复习句子发音">▶</button>
                </div>
              `).join("")}
            </div>
          `;
        })
        .filter(Boolean);

      document.getElementById("reviewList").innerHTML = reviewItems.length
        ? reviewItems.join("")
        : `<p class="empty">暂无复习内容</p>`;
    }

    function completeToday() {
      const state = loadState();
      if (!state.completedDays.includes(currentDay)) {
        state.completedDays.push(currentDay);
        state.completedDays.sort((a, b) => a - b);
      }
      state.completionDates[todayKey()] = true;
      saveState(state);
      renderLesson();
      showToast(encouragements[(currentDay - 1) % encouragements.length]);
    }

    function copyTodayContent() {
      const lesson = getLesson(currentDay);
      const text = [
        `老方泰语100天计划 Day ${lesson.day}`,
        `分类：${lesson.category}`,
        `主题：${lesson.theme}`,
        "",
        "今日泰语对话：",
        ...lesson.phrases.map((phrase, index) => `${index + 1}. ${phrase.thai}\n中文：${phrase.chinese}\n英文：${getEnglishMeaning(phrase)}\n发音：${phrase.roman}\n场景：${phrase.usage}`),
        "",
        "今日5个单词：",
        ...lesson.words.map((word, index) => `${index + 1}. ${word.thai}｜${word.chinese}｜${word.roman}`),
        "",
        `实战任务：${lesson.task}`
      ].join("\n");

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast("今日内容已复制"));
      } else {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
        showToast("今日内容已复制");
      }
    }

    function encodeProgress(payload) {
      const json = JSON.stringify(payload);
      const bytes = new TextEncoder().encode(json);
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary);
    }

    function decodeProgress(code) {
      const cleanCode = code.trim();
      const binary = atob(cleanCode);
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      const json = new TextDecoder().decode(bytes);
      return JSON.parse(json);
    }

    function exportProgress() {
      const payload = {
        app: "laofang-thai-100",
        version: 1,
        exportedAt: new Date().toISOString(),
        currentDay,
        state: normalizeState(loadState())
      };
      const code = encodeProgress(payload);
      const textarea = document.getElementById("syncCode");
      textarea.value = code;
      textarea.select();

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).then(() => showToast("进度码已复制，可以发到微信"));
      } else {
        document.execCommand("copy");
        showToast("进度码已生成，可以手动复制");
      }
    }

    function importProgress() {
      const textarea = document.getElementById("syncCode");
      if (!textarea.value.trim()) {
        showToast("请先粘贴进度码");
        return;
      }

      try {
        const payload = decodeProgress(textarea.value);
        if (!payload || payload.app !== "laofang-thai-100" || !payload.state) {
          throw new Error("Invalid progress code");
        }

        const importedState = normalizeState(payload.state);
        saveState(importedState);
        if (Number.isInteger(payload.currentDay) && payload.currentDay >= 1 && payload.currentDay <= 100) {
          currentDay = payload.currentDay;
        }
        renderLesson();
        showToast("进度已导入");
      } catch (error) {
        showToast("进度码无效，请重新复制完整内容");
      }
    }

    function randomQuiz() {
      const state = loadState();
      const learnedDays = state.completedDays.length ? state.completedDays : [];
      const pool = learnedDays.flatMap((day) => getLesson(day).phrases);

      if (!pool.length) {
        showToast("先完成至少一天打卡，再随机抽查。");
        return;
      }

      currentQuizPhrase = pool[Math.floor(Math.random() * pool.length)];
      document.getElementById("quizEmpty").style.display = "none";
      document.getElementById("quizBox").classList.add("show");
      document.getElementById("quizThai").textContent = currentQuizPhrase.thai;
      document.getElementById("quizRoman").textContent = currentQuizPhrase.roman;
      document.getElementById("quizChinese").textContent = currentQuizPhrase.chinese;
      document.getElementById("quizUsage").textContent = `使用场景：${currentQuizPhrase.usage}`;
      document.getElementById("quizAnswer").classList.remove("show");
    }

    function resetQuiz() {
      currentQuizPhrase = null;
      document.getElementById("quizEmpty").style.display = "block";
      document.getElementById("quizBox").classList.remove("show");
      document.getElementById("quizAnswer").classList.remove("show");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    document.addEventListener("click", (event) => {
      const speakButton = event.target.closest("[data-speak]");
      if (speakButton) speakThai(speakButton.dataset.speak);
    });

    document.getElementById("prevDay").addEventListener("click", () => {
      currentDay = Math.max(1, currentDay - 1);
      renderLesson();
    });

    document.getElementById("nextDay").addEventListener("click", () => {
      currentDay = Math.min(100, currentDay + 1);
      renderLesson();
    });

    document.getElementById("daySelect").addEventListener("change", (event) => {
      currentDay = Number(event.target.value);
      renderLesson();
    });

    document.getElementById("completeBtn").addEventListener("click", completeToday);
    document.getElementById("copyToday").addEventListener("click", copyTodayContent);
    document.getElementById("randomQuiz").addEventListener("click", randomQuiz);
    document.getElementById("resetQuiz").addEventListener("click", resetQuiz);
    document.getElementById("exportProgress").addEventListener("click", exportProgress);
    document.getElementById("importProgress").addEventListener("click", importProgress);
    document.getElementById("showAnswer").addEventListener("click", () => {
      document.getElementById("quizAnswer").classList.add("show");
    });
    document.getElementById("quizSpeak").addEventListener("click", () => {
      if (currentQuizPhrase) speakThai(getSpeakText(currentQuizPhrase));
    });

    renderDaySelect();
    renderLesson();
  </script>
